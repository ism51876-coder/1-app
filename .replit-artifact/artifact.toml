kind = "mobile"
previewPath = "/"
title = "Streak"
version = "1.0.0"
id = "artifacts/streak"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18460

[services.development]
run = "pnpm --filter @workspace/streak run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/streak", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/streak", "run", "serve" ]

[services.env]
PORT = "18460"
BASE_PATH = "/"
